<div class="app-layout" [class.sidebar-open]="layout.isSidebarOpen()">
  <!-- SIDEBAR -->
  <app-sidebar />

  @if (layout.isSidebarOpen()) {
    <div class="sidebar-overlay" (click)="layout.closeSidebar()"></div>
  }

  <div class="main-area">
    <app-navbar />
    <main class="main-content">
      <router-outlet />
    </main>
    <app-footer />
  </div>
</div>

<div class="chart-card">
  <div class="chart-header">
    <h3 class="chart-title">{{ title }}</h3>
  </div>

  <div class="chart-body">
    <svg
      [attr.viewBox]="'0 0 ' + svgWidth + ' ' + svgHeight"
      preserveAspectRatio="xMidYMid meet"
      class="line-svg"
    >
      <defs>
        <linearGradient [attr.id]="gradientId" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" [attr.stop-color]="color" stop-opacity="0.25" />
          <stop offset="100%" [attr.stop-color]="color" stop-opacity="0" />
        </linearGradient>
      </defs>

      <!-- Y grid lines + labels -->
      @for (tick of yTicks; track tick) {
        <line
          [attr.x1]="paddingLeft"
          [attr.x2]="svgWidth - paddingRight"
          [attr.y1]="yTickY(tick)"
          [attr.y2]="yTickY(tick)"
          class="grid-line"
        />
        <text
          [attr.x]="paddingLeft - 6"
          [attr.y]="yTickY(tick) + 4"
          text-anchor="end"
          class="axis-label"
        >
          {{ tick }}
        </text>
      }

      <!-- Area fill -->
      <path [attr.d]="areaPath" [attr.fill]="'url(#' + gradientId + ')'" class="area-fill" />

      <!-- Line -->
      <polyline
        [attr.points]="polyline"
        fill="none"
        [attr.stroke]="color"
        stroke-width="2.5"
        stroke-linejoin="round"
        stroke-linecap="round"
        class="line-path"
      />

      <!-- Dots + X labels -->
      @for (item of data; track item.label; let i = $index) {
        <!-- Invisible wide hit area for easy hover -->
        <rect
          [attr.x]="pointX(i) - 12"
          [attr.y]="paddingTop"
          width="24"
          [attr.height]="chartH"
          fill="transparent"
          class="dot-hitarea"
          (mouseenter)="showTooltip(i, item)"
          (mouseleave)="hideTooltip()"
        />
        <circle
          [attr.cx]="pointX(i)"
          [attr.cy]="pointY(item.value)"
          [attr.r]="tooltip()?.label === item.label ? 6 : 4"
          [attr.fill]="color"
          stroke="#fff"
          stroke-width="2"
          class="line-dot"
          (mouseenter)="showTooltip(i, item)"
          (mouseleave)="hideTooltip()"
        />
        <text [attr.x]="pointX(i)" [attr.y]="svgHeight - 8" text-anchor="middle" class="axis-label">
          {{ item.label }}
        </text>
      }

      <!-- X axis line -->
      <line
        [attr.x1]="paddingLeft"
        [attr.x2]="svgWidth - paddingRight"
        [attr.y1]="paddingTop + chartH"
        [attr.y2]="paddingTop + chartH"
        class="axis-line"
      />

      <!-- Tooltip -->
      @if (tooltip()) {
        <!-- Vertical guide line -->
        <line
          [attr.x1]="tooltip()!.x"
          [attr.x2]="tooltip()!.x"
          [attr.y1]="paddingTop"
          [attr.y2]="paddingTop + chartH"
          class="tooltip-guide"
        />
        <g class="chart-tooltip-group">
          <rect
            [attr.x]="tooltipX(tooltip()!.x)"
            [attr.y]="tooltip()!.y - 38"
            width="80"
            height="32"
            rx="6"
            class="tooltip-bg"
          />
          <text
            [attr.x]="tooltipX(tooltip()!.x) + 40"
            [attr.y]="tooltip()!.y - 22"
            text-anchor="middle"
            class="tooltip-label"
          >
            {{ tooltip()!.label }}
          </text>
          <text
            [attr.x]="tooltipX(tooltip()!.x) + 40"
            [attr.y]="tooltip()!.y - 10"
            text-anchor="middle"
            class="tooltip-value"
            [attr.fill]="color"
          >
            {{ tooltip()!.value }} {{ 'DASHBOARD.USERS' | translate }}
          </text>
        </g>
      }
    </svg>
  </div>
</div>

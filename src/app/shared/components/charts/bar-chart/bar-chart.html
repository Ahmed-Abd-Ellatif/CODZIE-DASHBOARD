<div class="chart-card">
  <div class="chart-header">
    <h3 class="chart-title">{{ title }}</h3>
    <div class="chart-legend">
      <span class="legend-item">
        <span class="legend-dot legend-dot--actual"></span> {{ 'DASHBOARD.ACTUAL' | translate }}
      </span>
      <span class="legend-item">
        <span class="legend-dot legend-dot--expected"></span> {{ 'DASHBOARD.EXPECTED' | translate }}
      </span>
    </div>
  </div>

  <div class="chart-body">
    <svg
      [attr.viewBox]="'0 0 ' + svgWidth + ' ' + svgHeight"
      preserveAspectRatio="xMidYMid meet"
      class="bar-svg"
    >
      <!-- Y grid lines & labels -->
      @for (tick of yTicks; track tick) {
        <line
          [attr.x1]="paddingLeft"
          [attr.x2]="svgWidth - paddingRight"
          [attr.y1]="yTickY(tick)"
          [attr.y2]="yTickY(tick)"
          class="grid-line"
        />
        <text
          [attr.x]="paddingLeft - 6"
          [attr.y]="yTickY(tick) + 4"
          text-anchor="end"
          class="axis-label"
        >
          {{ tick | number: '1.0-0' }}
        </text>
      }

      <!-- Bars -->
      @for (item of data; track item.label; let i = $index) {
        <!-- Actual bar -->
        <rect
          [attr.x]="barX(i, 0)"
          [attr.y]="barY(item.actual)"
          [attr.width]="barWidth()"
          [attr.height]="barHeight(item.actual)"
          rx="4"
          class="bar bar--actual"
          (mouseenter)="showTooltip(i, 0, item)"
          (mouseleave)="hideTooltip()"
        />
        <!-- Expected bar -->
        <rect
          [attr.x]="barX(i, 1)"
          [attr.y]="barY(item.expected)"
          [attr.width]="barWidth()"
          [attr.height]="barHeight(item.expected)"
          rx="4"
          class="bar bar--expected"
          (mouseenter)="showTooltip(i, 1, item)"
          (mouseleave)="hideTooltip()"
        />
        <!-- X label -->
        <text
          [attr.x]="labelX(i)"
          [attr.y]="svgHeight - 10"
          text-anchor="middle"
          class="axis-label"
        >
          {{ item.label }}
        </text>
      }

      <!-- X axis line -->
      <line
        [attr.x1]="paddingLeft"
        [attr.x2]="svgWidth - paddingRight"
        [attr.y1]="paddingTop + chartHeight"
        [attr.y2]="paddingTop + chartHeight"
        class="axis-line"
      />

      <!-- Tooltip -->
      @if (tooltip()) {
        <g class="chart-tooltip-group">
          <rect
            [attr.x]="tooltipX(tooltip()!.x)"
            [attr.y]="tooltip()!.y - 32"
            width="90"
            height="34"
            rx="6"
            class="tooltip-bg"
          />
          <text
            [attr.x]="tooltipX(tooltip()!.x) + 45"
            [attr.y]="tooltip()!.y - 16"
            text-anchor="middle"
            class="tooltip-label"
          >
            {{ tooltip()!.label }} – {{ tooltip()!.type }}
          </text>
          <text
            [attr.x]="tooltipX(tooltip()!.x) + 45"
            [attr.y]="tooltip()!.y - 4"
            text-anchor="middle"
            class="tooltip-value"
            [attr.fill]="tooltip()!.color"
          >
            {{ tooltip()!.value | number: '1.0-0' }} {{ 'DASHBOARD.CURRENCY' | translate }}
          </text>
        </g>
      }
    </svg>
  </div>
</div>

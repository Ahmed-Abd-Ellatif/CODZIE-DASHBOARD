<header class="navbar">
  <!-- Start: Hamburger -->
  <div class="navbar-start">
    <button class="navbar-icon-btn" (click)="layout.toggleSidebar()" aria-label="Toggle sidebar">
      <i class="fa-solid fa-bars-staggered fa-xl"></i>
    </button>
  </div>

  <!-- End: Actions -->
  <div class="navbar-end">
    <!-- Language Toggle -->
    <button
      class="navbar-icon-btn lang-btn"
      (click)="translation.toggleLang()"
      [attr.aria-label]="translation.currentLang() === 'en' ? 'العربية' : 'English'"
    >
      <span class="lang-label">{{ translation.currentLang() === 'en' ? 'AR' : 'EN' }}</span>
    </button>

    <!-- Dark / Light Toggle -->
    <button class="navbar-icon-btn" (click)="toggleDarkMode()" aria-label="Toggle theme">
      @if (isDark()) {
        <i class="fa fa-sun"></i>
      } @else {
        <i class="fa fa-moon"></i>
      }
    </button>

    <!-- User Menu -->
    <div class="user-menu">
      <button class="user-btn" (click)="toggleDropdown()" type="button">
        <div class="user-avatar">
          <i class="fa fa-user text-neutral-600"></i>
        </div>
        <div class="user-info">
          <span class="user-name">{{ 'USER.NAME' | translate }}</span>
          <span class="user-role">{{ 'USER.ROLE' | translate }}</span>
        </div>

        <i class="fa fa-chevron-down text-neutral-600 fa-2xs"></i>
      </button>

      @if (isDropdownOpen()) {
        <div class="user-dropdown">
          <div class="dropdown-header">
            <i class="fa fa-envelope"></i>
            <span class="dropdown-email">{{ 'USER.EMAIL' | translate }}</span>
          </div>

          <button class="dropdown-item" type="button">
            <i class="fa fa-user"></i>
            {{ 'NAVBAR.PROFILE' | translate }}
          </button>

          <hr class="dropdown-separator" />

          <button class="dropdown-item logout-item" type="button">
            <i class="fa fa-sign-out-alt"></i>
            {{ 'NAVBAR.LOGOUT' | translate }}
          </button>
        </div>
      }
    </div>
  </div>
</header>

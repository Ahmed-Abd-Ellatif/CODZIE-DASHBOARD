<header class="navbar">
  <!-- Start: Hamburger -->
  <div class="navbar-start">
    <button class="navbar-icon-btn" (click)="layout.toggleSidebar()" aria-label="Toggle sidebar">
      <img src="icons/menu.svg" />
    </button>
  </div>

  <!-- End: Actions -->
  <div class="navbar-end">
    <!-- Language Toggle -->
    <button
      class="navbar-icon-btn lang-btn"
      (click)="translation.toggleLang()"
      [attr.aria-label]="translation.currentLang() === 'en' ? 'العربية' : 'English'"
    >
      <span class="lang-label">{{ translation.currentLang() === 'en' ? 'AR' : 'EN' }}</span>
    </button>

    <!-- Dark / Light Toggle -->
    <button class="navbar-icon-btn" (click)="toggleDarkMode()" aria-label="Toggle theme">
      @if (isDark()) {
        <img src="./icons/light-mode.svg" />
      } @else {
        <img src="./icons/dark-mode.svg" />
      }
    </button>

    <!-- User Menu -->
    <div class="user-menu">
      <button class="user-btn" (click)="toggleDropdown()" type="button">
        <div class="user-avatar">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="white">
            <path
              d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"
            />
          </svg>
        </div>
        <div class="user-info">
          <span class="user-name">{{ 'USER.NAME' | translate }}</span>
          <span class="user-role">{{ 'USER.ROLE' | translate }}</span>
        </div>
        <svg
          class="user-chevron"
          [class.open]="isDropdownOpen()"
          width="16"
          height="16"
          viewBox="0 0 24 24"
          fill="none"
        >
          <path stroke="currentColor" stroke-width="2" stroke-linecap="round" d="M6 9l6 6 6-6" />
        </svg>
      </button>

      @if (isDropdownOpen()) {
        <div class="user-dropdown">
          <div class="dropdown-header">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor">
              <path
                d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4-8 5-8-5V6l8 5 8-5v2z"
              />
            </svg>
            <span class="dropdown-email">{{ 'USER.EMAIL' | translate }}</span>
          </div>

          <button class="dropdown-item" type="button">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor">
              <path
                d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"
              />
            </svg>
            {{ 'NAVBAR.PROFILE' | translate }}
          </button>

          <hr class="dropdown-separator" />

          <button class="dropdown-item logout-item" type="button">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor">
              <path
                d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"
              />
            </svg>
            {{ 'NAVBAR.LOGOUT' | translate }}
          </button>
        </div>
      }
    </div>
  </div>
</header>

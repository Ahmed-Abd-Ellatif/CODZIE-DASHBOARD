<aside class="sidebar" [class.open]="layout.isSidebarOpen()">
  <!-- ── Logo ── -->
  <div class="sidebar-logo">
    <div class="sidebar-logo-icon">
      <img src="assets/images/edufinex-icon.svg" alt="Edufinex Logo" />
    </div>
    <span class="sidebar-logo-text">{{ 'SIDEBAR.PROJECT_NAME' | translate }}</span>
  </div>

  <!-- ── Navigation ── -->
  <nav class="sidebar-nav">
    <!-- Dashboard (dropdown) -->
    <button
      class="sidebar-link"
      type="button"
      routerLink="/"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: true }"
    >
      <i class="fa-solid fa-gauge-high"></i>
      <span class="flex-1 text-start">{{ 'SIDEBAR.DASHBOARD' | translate }}</span>
    </button>
    <!-- My Projects (dropdown) -->
    <div>
      <button
        class="sidebar-link"
        [class.active]="openSection() === 'owners'"
        (click)="toggleSection('owners')"
        type="button"
      >
        <i class="fa-solid fa-users-gear"></i>
        <span class="flex-1 text-start" routerLinkActive="active">{{
          'SIDEBAR.OWNERS' | translate
        }}</span>
        <i
          class="fa-solid fa-chevron-down sidebar-chevron"
          [class.open]="openSection() === 'owners'"
        ></i>
      </button>

      @if (openSection() === 'owners') {
        <div class="sidebar-submenu">
          <a class="sidebar-sub-link" routerLinkActive="active" routerLink="/owners/list">{{
            'SIDEBAR.OWNERS_LIST' | translate
          }}</a>
          <a class="sidebar-sub-link" routerLinkActive="active" routerLink="/owners/add">{{
            'SIDEBAR.OWNERS_ADD' | translate
          }}</a>
          <a class="sidebar-sub-link" routerLinkActive="active" routerLink="/owners/archive">{{
            'SIDEBAR.OWNERS_ARCHIVE' | translate
          }}</a>
        </div>
      }
    </div>

    <!-- Settings (simple link) -->
    <button class="sidebar-link" type="button">
      <i class="fa-solid fa-gear"></i>
      <span class="flex-1 text-start">{{ 'SIDEBAR.SETTINGS' | translate }}</span>
    </button>
    <button
      class="sidebar-link"
      type="button"
      routerLink="/tickets/list"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: true }"
    >
      <i class="fa-solid fa-ticket"></i>
      <span class="flex-1 text-start">{{ 'SIDEBAR.TICKETS' | translate }}</span>
    </button>

    <button
      class="sidebar-link"
      type="button"
      routerLink="/design-system"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: true }"
    >
      <i class="fa-solid fa-palette"></i>
      <span class="flex-1 text-start">Design System</span>
    </button>
  </nav>

  <!-- ── Logout ── -->
  <div class="sidebar-footer">
    <button class="sidebar-logout-btn" (click)="logout()" type="button" routerLink="login">
      <i class="fa-solid fa-arrow-right-from-bracket"></i>
      <span>{{ 'SIDEBAR.LOGOUT' | translate }}</span>
    </button>
  </div>
</aside>
